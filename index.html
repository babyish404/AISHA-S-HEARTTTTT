<!DOCTYPE html>
<html>
<head>
<title>Aisha's Heart</title>

<style>

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(#3b0000, #8b0000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Georgia, serif;
    color: white;
    text-align: center;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
}

h1 {
    font-size: 35px;
}

.email {
    font-size: 80px;
    cursor: pointer;
    animation: shake 1s infinite;
}

@keyframes shake {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(10deg); }
    50% { transform: rotate(-10deg); }
    75% { transform: rotate(10deg); }
    100% { transform: rotate(0deg); }
}

p {
    font-size: 20px;
}

</style>

</head>


<body>

<div class="container">

<h1>Hii Saleem ❤️</h1>

<p>Aisha's Heart</p>

<p>You got an email 💌</p>

<div class="email">
✉️
</div>

</div>

</body>
</html>
