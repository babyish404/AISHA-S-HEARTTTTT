<!DOCTYPE html>
<html>

<head>

<title>Aisha's Heart</title>

<style>

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(#3b0000, #8b0000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Georgia, serif;
    color: white;
    text-align: center;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 50px;
    border-radius: 25px;
    width: 80%;
}

h1 {
    font-size: 40px;
}

p {
    font-size: 20px;
    line-height: 1.8;
}


.email {
    font-size: 130px;
    cursor: pointer;
    margin-top: 30px;
    animation: shake 0.8s infinite;
}


@keyframes shake {

0% {
transform: translateX(0) rotate(0deg);
}

20% {
transform: translateX(-12px) rotate(-10deg);
}

40% {
transform: translateX(12px) rotate(10deg);
}

60% {
transform: translateX(-12px) rotate(-10deg);
}

80% {
transform: translateX(12px) rotate(10deg);
}

100% {
transform: translateX(0) rotate(0deg);
}

}


</style>

</head>


<body>


<div class="container">


<h1>Hii Saleem ❤️</h1>

<p>Aisha's Heart</p>

<p>You got an email 💌</p>


<div class="email" onclick="openLetter()">

✉️

</div>


</div>



<script>

function openLetter(){


document.body.innerHTML = `


<style>

body{

background:linear-gradient(#3b0000,#8b0000);

color:white;

padding:40px;

text-align:center;

.paper h1{

font-size:35px;

<div class="paper">

</div>

</script>


</body>

</html>
